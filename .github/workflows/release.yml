name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-tui:
    name: Build ValoTracker.exe (TUI)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Build TUI release binary
        run: cargo build -p valotracker-tui --release

      - name: Build GUI release binary
        run: cargo build -p valotracker-gui --release --features gui

      - name: Build installer
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          & $iscc /DAppVersion=$version installer\ValoTracker.iss
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload binaries and installer to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/release/valotracker.exe
            target/release/valotracker-gui.exe
            dist/ValoTracker-Setup-*.exe
