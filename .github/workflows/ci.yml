name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  check:
    name: Check + Clippy
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: cargo check (TUI)
        run: cargo check -p valotracker-tui

      # --features gui enables eframe/egui/tray-icon; discord is always on
      # via valotracker-core's hard dependency declaration in valotracker-gui.
      - name: cargo check (GUI + discord)
        run: cargo check -p valotracker-gui --features gui

      - name: cargo check (py bindings)
        run: cargo check -p valotracker-py

      # Exclude valotracker-installer from clippy — it has no Rust code and
      # cargo-wix is not installed on the CI check runner.
      - name: cargo clippy (workspace)
        run: cargo clippy --workspace --exclude valotracker-installer -- -D warnings

      - name: cargo fmt check
        run: cargo fmt --all -- --check

  test:
    name: Test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}

      - name: cargo test
        run: cargo test --workspace
